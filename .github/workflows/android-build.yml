name: Build Android APK/AAB

# Triggers:
# - Manual run via GitHub Actions UI (workflow_dispatch)
# - On push to main if any android files changed (optional)
on:
  workflow_dispatch:
    inputs:
      build_type:
        description: 'Build type — apk (testing) or aab (Play Store)'
        required: true
        default: 'apk'
        type: choice
        options:
          - apk
          - aab
          - both
  push:
    branches:
      - main
    paths:
      - 'android/**'
      - '.github/workflows/android-build.yml'

jobs:
  build:
    name: Build ExamVault Android
    runs-on: ubuntu-latest

    steps:
      - name: Checkout code
        uses: actions/checkout@v4

      - name: Set up JDK 17
        uses: actions/setup-java@v4
        with:
          distribution: 'temurin'
          java-version: '17'
          cache: gradle

      - name: Set up Android SDK
        uses: android-actions/setup-android@v3
        with:
          api-level: 34
          build-tools-version: '34.0.0'

      - name: Grant execute permission for gradlew
        working-directory: android
        run: |
          # Generate gradlew wrapper (no binary shipped in repo)
          gradle wrapper --gradle-version 8.2
          chmod +x gradlew

      - name: Build Debug APK
        if: github.event.inputs.build_type == 'apk' || github.event.inputs.build_type == 'both' || github.event_name == 'push'
        working-directory: android
        run: ./gradlew assembleDebug --no-daemon

      - name: Build Release AAB
        if: github.event.inputs.build_type == 'aab' || github.event.inputs.build_type == 'both'
        working-directory: android
        run: ./gradlew bundleRelease --no-daemon

      - name: Upload APK artifacts
        if: success()
        uses: actions/upload-artifact@v4
        with:
          name: ExamVault-APK
          path: |
            android/app/build/outputs/apk/**/*.apk
          if-no-files-found: ignore
          retention-days: 30

      - name: Upload AAB artifacts
        if: success()
        uses: actions/upload-artifact@v4
        with:
          name: ExamVault-AAB
          path: |
            android/app/build/outputs/bundle/**/*.aab
          if-no-files-found: ignore
          retention-days: 30

      - name: Summary
        if: always()
        run: |
          echo "## Build Summary" >> $GITHUB_STEP_SUMMARY
          echo "" >> $GITHUB_STEP_SUMMARY
          echo "Build type: ${{ github.event.inputs.build_type || 'apk (default on push)' }}" >> $GITHUB_STEP_SUMMARY
          echo "" >> $GITHUB_STEP_SUMMARY
          echo "### Artifacts" >> $GITHUB_STEP_SUMMARY
          echo "- 📱 APK: download from 'ExamVault-APK' artifact" >> $GITHUB_STEP_SUMMARY
          echo "- 📦 AAB: download from 'ExamVault-AAB' artifact (Play Store upload)" >> $GITHUB_STEP_SUMMARY
