name: Build Android APK

on:
  workflow_dispatch:
    inputs:
      app_url:
        description: 'Deployed PWA URL (e.g. https://examvault.vercel.app)'
        required: true

jobs:
  build:
    runs-on: ubuntu-latest
    steps:
      - name: Checkout code
        uses: actions/checkout@v4

      - name: Setup JDK 17
        uses: actions/setup-java@v4
        with:
          java-version: '17'
          distribution: 'temurin'

      - name: Setup Android SDK
        uses: android-actions/setup-android@v3

      - name: Accept licenses & install build tools
        run: |
          yes | sdkmanager --licenses 2>/dev/null || true
          sdkmanager "platforms;android-34" "build-tools;34.0.0"

      - name: Setup Node.js 20
        uses: actions/setup-node@v4
        with:
          node-version: '20'

      - name: Install Bubblewrap CLI
        run: |
          npm i -g @nicolo-ribaudo/chokidar-2 2>/dev/null || true
          npm i -g @nicolo-ribaudo/chokidar-cli 2>/dev/null || true
          npm i -g @nicolo-ribaudo/chokidar-2 2>/dev/null || true
          npm i -g bubblewrap-cli

      - name: Generate signing keystore
        run: |
          keytool -genkeypair \
            -dname "CN=ExamVault, O=ExamVault, C=IN" \
            -alias examvault \
            -keyalg RSA -keysize 2048 -validity 10000 \
            -keystore examvault.keystore \
            -storepass examvault -keypass examvault

      - name: Create TWA manifest config
        run: |
          APP_URL="${{ github.event.inputs.app_url }}"
          HOST=$(echo "$APP_URL" | sed 's|https\?://||' | sed 's|/.*||')
          cat > twa-manifest.json << EOF
          {
            "appVersionName": "1.0.0",
            "appVersionCode": 1,
            "shortName": "ExamVault",
            "name": "EXAMVAULT",
            "launcherName": "ExamVault",
            "display": "standalone",
            "themeColor": "#001A4B",
            "navigationColor": "#001A4B",
            "backgroundColor": "#001A4B",
            "enableNotifications": true,
            "startUrl": "/",
            "webManifestUrl": "${APP_URL}/manifest.json",
            "scope": "/",
            "additionalTrustedOrigins": [],
            "icons": [
              {"src": "${APP_URL}/icons/icon-192x192.png", "sizes": "192x192"},
              {"src": "${APP_URL}/icons/icon-512x512.png", "sizes": "512x512"}
            ],
            "splashScreenFadeOutDuration": 300,
            "signingKey": {"alias": "examvault", "path": "../examvault.keystore"},
            "packageId": "com.examvault.app",
            "host": "${HOST}"
          }
          EOF
          echo "Generated twa-manifest.json for host: $HOST"

      - name: Initialize TWA Android project
        run: |
          echo "y" | bubblewrap init \
            --manifest=twa-manifest.json \
            --directory=android-twa \
            --skip-pwa-validation
        env:
          CI: 1

      - name: Build Release APK
        working-directory: android-twa
        run: |
          chmod +x gradlew
          ./gradlew assembleRelease --no-daemon 2>&1 || ./gradlew assembleDebug --no-daemon 2>&1
        env:
          KEYSTORE_PASSWORD: examvault
          KEY_ALIAS: examvault
          KEY_PASSWORD: examvault

      - name: Locate APK file
        run: |
          echo "Searching for APK..."
          find android-twa -name "*.apk" -type f
          APK=$(find android-twa -name "*.apk" -type f | head -1)
          echo "APK_PATH=$APK" >> $GITHUB_ENV
          if [ -n "$APK" ]; then
            cp "$APK" examvault.apk
            echo "APK found: $APK"
          else
            echo "ERROR: No APK found!"
            exit 1
          fi

      - name: Upload APK as artifact
        uses: actions/upload-artifact@v4
        with:
          name: examvault-apk
          path: examvault.apk

      - name: Create GitHub Release
        uses: softprops/action-gh-release@v2
        with:
          tag_name: v1.0.${{ github.run_number }}
          name: ExamVault APK v1.0.${{ github.run_number }}
          body: |
            ExamVault Android APK

            Install this APK on your Android phone to use ExamVault as a native app.

            Features:
            - Mock Tests, Free Tests, Previous Papers
            - Notes & Daily Tips
            - Leaderboard & Profile
            - Offline support via PWA
          files: examvault.apk
        env:
          GITHUB_TOKEN: ${{ secrets.GITHUB_TOKEN }}
