name: Build Android APK

on:
  workflow_dispatch:
    inputs:
      app_url:
        description: 'Deployed PWA URL (e.g. https://examvault.vercel.app)'
        required: true

permissions:
  contents: write

jobs:
  build:
    runs-on: ubuntu-latest
    timeout-minutes: 25
    steps:
      - name: Checkout code
        uses: actions/checkout@v4

      - name: Setup JDK 17
        uses: actions/setup-java@v4
        with:
          java-version: '17'
          distribution: 'temurin'

      - name: Setup Android SDK
        uses: android-actions/setup-android@v3

      - name: Install Android components
        run: |
          yes | sdkmanager --licenses 2>/dev/null || true
          sdkmanager "platforms;android-35" "build-tools;35.0.0"

      - name: Setup Node.js
        uses: actions/setup-node@v4
        with:
          node-version: '22'

      - name: Install chokidar polyfill
        run: |
          npm cache clean --force 2>/dev/null || true
          npm install -g @nicolo-ribaudo/chokidar-2 2>&1
          echo "chokidar done"

      - name: Install Bubblewrap CLI
        run: |
          npm install -g @bubblewrap/cli 2>&1
          bubblewrap --version
          echo "bubblewrap installed"

      - name: Generate signing keystore
        run: |
          keytool -genkeypair \
            -dname "CN=ExamVault, O=ExamVault, C=IN" \
            -alias examvault \
            -keyalg RSA -keysize 2048 -validity 10000 \
            -keystore examvault.keystore \
            -storepass examvault -keypass examvault

      - name: Create TWA manifest
        run: |
          APP_URL="${{ github.event.inputs.app_url }}"
          HOST=$(echo "$APP_URL" | sed 's|https\?://||' | sed 's|/.*||')
          echo "Building TWA for: $APP_URL (host: $HOST)"

          cat > twa-manifest.json << EOF
          {
            "appVersionName": "1.0.0",
            "appVersionCode": 1,
            "shortName": "ExamVault",
            "name": "EXAMVAULT",
            "launcherName": "ExamVault",
            "display": "standalone",
            "orientation": "portrait",
            "themeColor": "#001A4B",
            "navigationColor": "#001A4B",
            "backgroundColor": "#001A4B",
            "enableNotifications": true,
            "startUrl": "/",
            "webManifestUrl": "${APP_URL}/manifest.json",
            "scope": "/",
            "additionalTrustedOrigins": [],
            "icons": [
              {"src": "${APP_URL}/icons/icon-192x192.png", "sizes": "192x192"},
              {"src": "${APP_URL}/icons/icon-512x512.png", "sizes": "512x512"}
            ],
            "splashScreenFadeOutDuration": 300,
            "signingKey": {
              "alias": "examvault",
              "path": "../examvault.keystore"
            },
            "packageId": "com.examvault.app",
            "host": "${HOST}"
          }
          EOF

          cat twa-manifest.json

      - name: Initialize TWA project
        run: |
          yes | bubblewrap init \
            --manifest=twa-manifest.json \
            --directory=android-twa 2>&1 || \
          yes | bubblewrap init \
            --manifest=twa-manifest.json \
            --directory=android-twa \
            --skip-pwa-validation 2>&1
        env:
          CI: 1

      - name: Build Debug APK
        working-directory: android-twa
        run: |
          chmod +x gradlew
          ./gradlew assembleDebug --no-daemon 2>&1

      - name: Find and prepare APK
        run: |
          APK=$(find android-twa -name "*.apk" -type f | head -1)
          if [ -z "$APK" ]; then echo "No APK!"; exit 1; fi
          cp "$APK" examvault.apk
          ls -lh examvault.apk

      - name: Upload APK artifact
        uses: actions/upload-artifact@v4
        with:
          name: examvault-apk
          path: examvault.apk

      - name: Create GitHub Release
        uses: softprops/action-gh-release@v2
        with:
          tag_name: v1.0.${{ github.run_number }}
          name: ExamVault APK v1.0.${{ github.run_number }}
          body: |
            ## ExamVault Android APK

            Download and install on your Android phone.

            ### Features:
            - Mock Tests, Free Tests, Daily Quizzes
            - Previous Year Papers & Notes
            - Leaderboard & Profile
            - Hardware back button support

            ### How to Install:
            1. Download examvault.apk below
            2. Open on your Android phone
            3. Allow "Install from unknown sources" if prompted
            4. Install and enjoy!
          files: examvault.apk
        env:
          GITHUB_TOKEN: ${{ secrets.GITHUB_TOKEN }}
