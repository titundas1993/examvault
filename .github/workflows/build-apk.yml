name: Build Android APK

on:
  workflow_dispatch:
    inputs:
      app_url:
        description: 'Deployed PWA URL (e.g. https://examvault-theta.vercel.app)'
        required: true

permissions:
  contents: write

jobs:
  build:
    runs-on: ubuntu-latest
    timeout-minutes: 20
    steps:
      - name: Checkout code
        uses: actions/checkout@v4

      - name: Setup JDK 17
        uses: actions/setup-java@v4
        with:
          java-version: '17'
          distribution: 'temurin'

      - name: Setup Android SDK
        uses: android-actions/setup-android@v3

      - name: Install Android components
        run: |
          yes | sdkmanager --licenses 2>/dev/null || true
          sdkmanager "platforms;android-35" "build-tools;35.0.0"

      - name: Generate signing keystore
        run: |
          keytool -genkeypair \
            -dname "CN=ExamVault, O=ExamVault, C=IN" \
            -alias examvault \
            -keyalg RSA -keysize 2048 -validity 10000 \
            -keystore examvault.keystore \
            -storepass examvault -keypass examvault

      - name: Create Android WebView project
        run: |
          APP_URL="${{ github.event.inputs.app_url }}"
          HOST=$(echo "$APP_URL" | sed 's|https\?://||' | sed 's|/.*||')
          echo "Building for: $APP_URL"

          # Create project directory structure
          mkdir -p android-project/app/src/main/java/com/examvault/app
          mkdir -p android-project/app/src/main/res/values
          mkdir -p android-project/app/src/main/res/mipmap-hdpi
          mkdir -p android-project/app/src/main/res/mipmap-mdpi
          mkdir -p android-project/app/src/main/res/mipmap-xhdpi
          mkdir -p android-project/app/src/main/res/mipmap-xxhdpi
          mkdir -p android-project/app/src/main/res/mipmap-xxxhdpi
          mkdir -p android-project/gradle/wrapper

          # Copy icons from public/icons
          cp public/icons/icon-72x72.png android-project/app/src/main/res/mipmap-mdpi/ic_launcher.png
          cp public/icons/icon-96x96.png android-project/app/src/main/res/mipmap-hdpi/ic_launcher.png
          cp public/icons/icon-144x144.png android-project/app/src/main/res/mipmap-xhdpi/ic_launcher.png
          cp public/icons/icon-192x192.png android-project/app/src/main/res/mipmap-xxhdpi/ic_launcher.png
          cp public/icons/icon-512x512.png android-project/app/src/main/res/mipmap-xxxhdpi/ic_launcher.png

          # settings.gradle
          cat > android-project/settings.gradle << 'EOF'
          pluginManagement {
              repositories {
                  google()
                  mavenCentral()
                  gradlePluginPortal()
              }
          }
          dependencyResolutionManagement {
              repositoriesMode.set(RepositoriesMode.FAIL_ON_PROJECT_REPOS)
              repositories {
                  google()
                  mavenCentral()
              }
          }
          rootProject.name = "ExamVault"
          include ':app'
          EOF

          # build.gradle (project)
          cat > android-project/build.gradle << 'EOF'
          plugins {
              id 'com.android.application' version '8.7.3' apply false
          }
          EOF

          # build.gradle (app)
          cat > android-project/app/build.gradle << EOF
          plugins {
              id 'com.android.application'
          }
          android {
              namespace 'com.examvault.app'
              compileSdk 35
              defaultConfig {
                  applicationId "com.examvault.app"
                  minSdk 21
                  targetSdk 35
                  versionCode 1
                  versionName "1.0.0"
              }
              buildTypes {
                  release {
                      minifyEnabled true
                      proguardFiles getDefaultProguardFile('proguard-android-optimize.txt'), 'proguard-rules.pro'
                      signingConfig signingConfigs.debug
                  }
              }
              compileOptions {
                  sourceCompatibility JavaVersion.VERSION_17
                  targetCompatibility JavaVersion.VERSION_17
              }
          }
          dependencies {
              implementation 'androidx.core:core:1.15.0'
              implementation 'androidx.webkit:webkit:1.12.1'
          }
          EOF

          # AndroidManifest.xml
          cat > android-project/app/src/main/AndroidManifest.xml << 'XMLEOF'
          <?xml version="1.0" encoding="utf-8"?>
          <manifest xmlns:android="http://schemas.android.com/apk/res/android">
              <uses-permission android:name="android.permission.INTERNET" />
              <uses-permission android:name="android.permission.ACCESS_NETWORK_STATE" />
              <uses-permission android:name="android.permission.POST_NOTIFICATIONS" />
              <application
                  android:allowBackup="true"
                  android:icon="@mipmap/ic_launcher"
                  android:label="ExamVault"
                  android:supportsRtl="true"
                  android:theme="@style/Theme.ExamVault"
                  android:usesCleartextTraffic="false"
                  android:networkSecurityConfig="@xml/network_security_config">
                  <activity
                      android:name=".MainActivity"
                      android:exported="true"
                      android:configChanges="orientation|screenSize|keyboard|keyboardHidden"
                      android:launchMode="singleTop">
                      <intent-filter>
                          <action android:name="android.intent.action.MAIN" />
                          <category android:name="android.intent.category.LAUNCHER" />
                      </intent-filter>
                  </activity>
              </application>
          </manifest>
          XMLEOF

          # Network security config
          mkdir -p android-project/app/src/main/res/xml
          cat > android-project/app/src/main/res/xml/network_security_config.xml << 'XMLEOF'
          <?xml version="1.0" encoding="utf-8"?>
          <network-security-config>
              <domain-config cleartextTrafficPermitted="false">
                  <domain includeSubdomains="true">examvault-theta.vercel.app</domain>
                  <domain includeSubdomains="true">firebaseio.com</domain>
                  <domain includeSubdomains="true">googleapis.com</domain>
              </domain-config>
          </network-security-config>
          XMLEOF

          # MainActivity.java
          cat > android-project/app/src/main/java/com/examvault/app/MainActivity.java << JAVAEOF
          package com.examvault.app;

          import android.app.Activity;
          import android.app.AlertDialog;
          import android.content.DialogInterface;
          import android.os.Bundle;
          import android.webkit.WebView;
          import android.webkit.WebViewClient;
          import android.webkit.WebSettings;
          import android.webkit.WebChromeClient;
          import android.webkit.ValueCallback;
          import android.webkit.WebResourceRequest;
          import android.view.KeyEvent;
          import android.view.View;
          import android.view.Window;
          import android.view.WindowManager;
          import android.widget.FrameLayout;
          import android.widget.LinearLayout;
          import android.widget.ProgressBar;
          import android.widget.TextView;
          import android.net.Uri;
          import android.graphics.Color;

          public class MainActivity extends Activity {
              private WebView webView;
              private View splashScreen;
              private boolean webViewReady = false;

              @Override
              protected void onCreate(Bundle savedInstanceState) {
                  super.onCreate(savedInstanceState);
                  requestWindowFeature(Window.FEATURE_NO_TITLE);
                  getWindow().setFlags(
                      WindowManager.LayoutParams.FLAG_FULLSCREEN,
                      WindowManager.LayoutParams.FLAG_FULLSCREEN);

                  // Create a container layout
                  FrameLayout container = new FrameLayout(this);
                  setContentView(container);

                  // === SPLASH SCREEN (shown while WebView loads) ===
                  splashScreen = new View(this) {
                      @Override
                      protected void onDraw(android.graphics.Canvas canvas) {
                          super.onDraw(canvas);
                          // Dark navy background
                          canvas.drawColor(Color.parseColor("#001A4B"));
                          // App name
                          android.graphics.Paint paint = new android.graphics.Paint();
                          paint.setColor(Color.WHITE);
                          paint.setTextSize(80);
                          paint.setTypeface(android.graphics.Typeface.create(android.graphics.Typeface.DEFAULT, android.graphics.Typeface.BOLD));
                          paint.setTextAlign(android.graphics.Paint.Align.CENTER);
                          int cx = getWidth() / 2;
                          int cy = getHeight() / 2 - 40;
                          canvas.drawText("EXAM", cx, cy, paint);
                          paint.setColor(Color.parseColor("#EB6301"));
                          canvas.drawText("VAULT", cx, cy + 90, paint);
                          // Subtitle
                          paint.setColor(Color.parseColor("#FEA216"));
                          paint.setTextSize(28);
                          paint.setTypeface(android.graphics.Typeface.create(android.graphics.Typeface.DEFAULT, android.graphics.Typeface.NORMAL));
                          canvas.drawText("Mock Tests, PYQs & Exam Updates", cx, cy + 150, paint);
                          // Loading indicator
                          paint.setColor(Color.parseColor("#FEA216"));
                          paint.setTextSize(24);
                          canvas.drawText("Loading...", cx, cy + 230, paint);
                      }
                  };
                  FrameLayout.LayoutParams splashParams = new FrameLayout.LayoutParams(
                      FrameLayout.LayoutParams.MATCH_PARENT,
                      FrameLayout.LayoutParams.MATCH_PARENT);
                  container.addView(splashScreen, splashParams);

                  // === WEBVIEW ===
                  webView = new WebView(this);
                  FrameLayout.LayoutParams webParams = new FrameLayout.LayoutParams(
                      FrameLayout.LayoutParams.MATCH_PARENT,
                      FrameLayout.LayoutParams.MATCH_PARENT);
                  container.addView(webView, webParams);

                  // Initially hide WebView until page loads
                  webView.setVisibility(View.GONE);

                  WebSettings settings = webView.getSettings();
                  settings.setJavaScriptEnabled(true);
                  settings.setDomStorageEnabled(true);
                  settings.setDatabaseEnabled(true);
                  settings.setCacheMode(WebSettings.LOAD_DEFAULT);
                  settings.setAllowFileAccess(true);
                  settings.setMediaPlaybackRequiresUserGesture(false);
                  settings.setSupportZoom(false);
                  settings.setUseWideViewPort(true);
                  settings.setLoadWithOverviewMode(true);
                  settings.setMixedContentMode(WebSettings.MIXED_CONTENT_NEVER_ALLOW);

                  webView.setWebViewClient(new WebViewClient() {
                      @Override
                      public boolean shouldOverrideUrlLoading(WebView view, WebResourceRequest request) {
                          String url = request.getUrl().toString();
                          String host = request.getUrl().getHost();
                          if (host != null &&
                              (host.contains("examvault") ||
                               host.contains("vercel.app") ||
                               host.contains("firebaseio.com") ||
                               host.contains("googleapis.com") ||
                               host.contains("firebaseapp.com"))) {
                              return false;
                          }
                          view.getContext().startActivity(new android.content.Intent(android.content.Intent.ACTION_VIEW, Uri.parse(url)));
                          return true;
                      }

                      @Override
                      public void onPageFinished(WebView view, String url) {
                          super.onPageFinished(view, url);
                          if (!webViewReady) {
                              webViewReady = true;
                              // Hide splash, show WebView
                              splashScreen.setVisibility(View.GONE);
                              webView.setVisibility(View.VISIBLE);
                          }
                          // Keep splash hidden on subsequent page loads
                          splashScreen.post(new Runnable() {
                              @Override
                              public void run() {
                                  splashScreen.setVisibility(View.GONE);
                                  webView.setVisibility(View.VISIBLE);
                              }
                          });
                      }

                      @Override
                      public void onRenderProcessGone(WebView view, android.webkit.RenderProcessGoneDetail detail) {
                          // WebView crashed — reload
                          if (!detail.didCrash()) {
                              // Renderer was killed by OS (low memory) — reload
                              view.loadUrl("${APP_URL}");
                          }
                      }
                  });

                  webView.setWebChromeClient(new WebChromeClient());

                  // RESTORE WebView state if available (prevents white screen after minimize)
                  if (savedInstanceState != null) {
                      webView.restoreState(savedInstanceState);
                  } else {
                      // Fresh launch — load the PWA URL
                      webView.loadUrl("${APP_URL}");
                  }
              }

              // === SAVE WebView state when activity is destroyed by OS ===
              @Override
              protected void onSaveInstanceState(Bundle outState) {
                  super.onSaveInstanceState(outState);
                  if (webView != null) {
                      webView.saveState(outState);
                  }
              }

              // === HANDLE RESTORE ===
              @Override
              protected void onRestoreInstanceState(Bundle savedInstanceState) {
                  super.onRestoreInstanceState(savedInstanceState);
                  if (webView != null) {
                      webView.restoreState(savedInstanceState);
                  }
              }

              @Override
              public void onBackPressed() {
                  // Ask the PWA if it can go back via JavaScript
                  webView.evaluateJavascript("(function(){ try { var s = window.__ZUSTAND_STORE__ || (typeof useAppStore !== 'undefined' ? useAppStore : null); if(s && s.getState) { var state = s.getState(); if(state.canGoBack && state.canGoBack()) { state.goBack(); return 'went_back'; } else if(state.currentView === 'home') { return 'at_home'; } else { state.goBack(); return 'went_back'; } } return 'no_store'; } catch(e) { return 'error:' + e.message; } })()", new ValueCallback<String>() {
                      @Override
                      public void onReceiveValue(String result) {
                          result = result != null ? result.replace("\"", "") : "";
                          if ("went_back".equals(result)) {
                              // PWA handled back — do nothing
                          } else if ("at_home".equals(result)) {
                              showExitDialog();
                          } else {
                              if (webView.canGoBack()) {
                                  webView.goBack();
                              } else {
                                  showExitDialog();
                              }
                          }
                      }
                  });
              }

              private void showExitDialog() {
                  new AlertDialog.Builder(this)
                      .setTitle("Exit ExamVault?")
                      .setMessage("Are you sure you want to close the app?")
                      .setPositiveButton("Exit", new DialogInterface.OnClickListener() {
                          @Override
                          public void onClick(DialogInterface dialog, int which) {
                              finish();
                          }
                      })
                      .setNegativeButton("Cancel", null)
                      .show();
              }

              @Override
              protected void onResume() {
                  super.onResume();
                  if (webView != null) {
                      webView.onResume();
                      // If WebView is blank after resume, reload
                      webView.postDelayed(new Runnable() {
                          @Override
                          public void run() {
                              if (webView != null && webView.getContentHeight() == 0) {
                                  webView.loadUrl("${APP_URL}");
                              }
                          }
                      }, 500);
                  }
              }

              @Override
              protected void onPause() {
                  if (webView != null) webView.onPause();
                  super.onPause();
              }

              @Override
              protected void onDestroy() {
                  if (webView != null) {
                      webView.stopLoading();
                      webView.setWebViewClient(null);
                      webView.setWebChromeClient(null);
                      webView.destroy();
                      webView = null;
                  }
                  super.onDestroy();
              }
          }
          JAVAEOF

          # strings.xml
          cat > android-project/app/src/main/res/values/strings.xml << 'EOF'
          <?xml version="1.0" encoding="utf-8"?>
          <resources>
              <string name="app_name">ExamVault</string>
          </resources>
          EOF

          # colors.xml
          cat > android-project/app/src/main/res/values/colors.xml << 'EOF'
          <?xml version="1.0" encoding="utf-8"?>
          <resources>
              <color name="colorPrimary">#001A4B</color>
              <color name="colorPrimaryDark">#001A4B</color>
              <color name="colorAccent">#EB6301</color>
          </resources>
          EOF

          # styles.xml
          cat > android-project/app/src/main/res/values/styles.xml << 'EOF'
          <?xml version="1.0" encoding="utf-8"?>
          <resources>
              <style name="Theme.ExamVault" parent="android:Theme.Material.Light.NoActionBar">
                  <item name="android:colorPrimary">@color/colorPrimary</item>
                  <item name="android:colorPrimaryDark">@color/colorPrimaryDark</item>
                  <item name="android:colorAccent">@color/colorAccent</item>
                  <item name="android:statusBarColor">@color/colorPrimary</item>
                  <item name="android:navigationBarColor">@color/colorPrimary</item>
              </style>
          </resources>
          EOF

          # proguard rules
          cat > android-project/app/proguard-rules.pro << 'EOF'
          -keepclassmembers class * {
              @android.webkit.JavascriptInterface <methods>;
          }
          EOF

          # gradle wrapper properties
          cat > android-project/gradle/wrapper/gradle-wrapper.properties << 'EOF'
          distributionBase=GRADLE_USER_HOME
          distributionPath=wrapper/dists
          distributionUrl=https\://services.gradle.org/distributions/gradle-8.9-bin.zip
          zipStoreBase=GRADLE_USER_HOME
          zipStorePath=wrapper/dists
          EOF

          # gradlew script (minimal)
          cat > android-project/gradlew << 'GRADLEWEOF'
          #!/bin/sh
          exec gradle "$@"
          GRADLEWEOF
          chmod +x android-project/gradlew

          # gradle.properties
          cat > android-project/gradle.properties << 'EOF'
          android.useAndroidX=true
          org.gradle.jvmargs=-Xmx2048m
          EOF

          echo "Android project created!"
          find android-project -type f | head -20

      - name: Build Debug APK
        working-directory: android-project
        run: |
          # Use gradle directly since we don't have the full wrapper
          gradle assembleDebug --no-daemon 2>&1 || {
            echo "Gradle failed, trying with wrapper setup..."
            # Create proper wrapper
            gradle wrapper --gradle-version 8.9 2>&1 || true
            ./gradlew assembleDebug --no-daemon 2>&1
          }

      - name: Find and prepare APK
        run: |
          APK=$(find android-project -name "*.apk" -type f | head -1)
          if [ -z "$APK" ]; then
            echo "No APK found!"
            find android-project -name "*.apk" -type f 2>/dev/null
            ls -la android-project/app/build/outputs/apk/debug/ 2>/dev/null || true
            exit 1
          fi
          cp "$APK" examvault.apk
          ls -lh examvault.apk

      - name: Upload APK artifact
        uses: actions/upload-artifact@v4
        with:
          name: examvault-apk
          path: examvault.apk

      - name: Create GitHub Release
        uses: softprops/action-gh-release@v2
        with:
          tag_name: v1.0.${{ github.run_number }}
          name: ExamVault APK v1.0.${{ github.run_number }}
          body: |
            ## ExamVault Android APK

            ### How to Install:
            1. Download examvault.apk below
            2. Open on your Android phone
            3. Allow "Install from unknown sources" if prompted
            4. Install and enjoy!

            ### Features:
            - Mock Tests, Free Tests, Daily Quizzes
            - Previous Year Papers & Notes
            - Leaderboard & Profile
            - Hardware back button support
          files: examvault.apk
        env:
          GITHUB_TOKEN: ${{ secrets.GITHUB_TOKEN }}
