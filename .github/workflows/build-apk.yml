name: Build Android APK

on:
  workflow_dispatch:
    inputs:
      app_url:
        description: 'Deployed PWA URL (e.g. https://examvault-theta.vercel.app)'
        required: true
      admob_app_id:
        description: 'AdMob App ID (ca-app-pub-XXXXX~YYYYY, tilde not slash!)'
        required: false
        default: 'ca-app-pub-1742730064755213~7890219994'
      admob_interstitial_id:
        description: 'AdMob Interstitial Ad Unit ID (ca-app-pub-XXXXX/YYYYY)'
        required: false
        default: 'ca-app-pub-1742730064755213/5520307609'
      build_aab:
        description: 'Also build AAB for Play Store? (true/false)'
        required: false
        default: 'false'

permissions:
  contents: write

jobs:
  build:
    runs-on: ubuntu-latest
    timeout-minutes: 25
    steps:
      - name: Checkout code
        uses: actions/checkout@v4

      - name: Setup JDK 17
        uses: actions/setup-java@v4
        with:
          java-version: '17'
          distribution: 'temurin'

      - name: Setup Android SDK
        uses: android-actions/setup-android@v3

      - name: Install Android components
        run: |
          yes | sdkmanager --licenses 2>/dev/null || true
          sdkmanager "platforms;android-35" "build-tools;35.0.0"

      - name: Decode release keystore
        run: |
          echo "${{ secrets.KEYSTORE_BASE64 }}" | base64 -d > examvault-release.keystore

      - name: Create Android WebView project
        run: |
          APP_URL="${{ github.event.inputs.app_url }}"
          ADMOB_APP_ID="${{ github.event.inputs.admob_app_id }}"
          ADMOB_INTERSTITIAL_ID="${{ github.event.inputs.admob_interstitial_id }}"
          BUILD_AAB="${{ github.event.inputs.build_aab }}"
          echo "Building for: $APP_URL (AAB: $BUILD_AAB)"
          echo "AdMob App ID: $ADMOB_APP_ID"
          echo "AdMob Interstitial ID: $ADMOB_INTERSTITIAL_ID"

          # Extract domain from APP_URL for network security config
          APP_DOMAIN=$(echo "$APP_URL" | sed -E 's|https?://([^/]+).*|\1|')
          echo "App domain: $APP_DOMAIN"

          # Create project directory structure
          mkdir -p android-project/app/src/main/java/com/examvault/education
          mkdir -p android-project/app/src/main/res/values
          mkdir -p android-project/app/src/main/res/mipmap-hdpi
          mkdir -p android-project/app/src/main/res/mipmap-mdpi
          mkdir -p android-project/app/src/main/res/mipmap-xhdpi
          mkdir -p android-project/app/src/main/res/mipmap-xxhdpi
          mkdir -p android-project/app/src/main/res/mipmap-xxxhdpi
          mkdir -p android-project/gradle/wrapper

          # Copy icons from public/icons
          cp public/icons/icon-72x72.png android-project/app/src/main/res/mipmap-mdpi/ic_launcher.png
          cp public/icons/icon-96x96.png android-project/app/src/main/res/mipmap-hdpi/ic_launcher.png
          cp public/icons/icon-144x144.png android-project/app/src/main/res/mipmap-xhdpi/ic_launcher.png
          cp public/icons/icon-192x192.png android-project/app/src/main/res/mipmap-xxhdpi/ic_launcher.png
          cp public/icons/icon-512x512.png android-project/app/src/main/res/mipmap-xxxhdpi/ic_launcher.png

          # settings.gradle
          cat > android-project/settings.gradle << 'EOF'
          pluginManagement {
              repositories {
                  google()
                  mavenCentral()
                  gradlePluginPortal()
              }
          }
          dependencyResolutionManagement {
              repositoriesMode.set(RepositoriesMode.FAIL_ON_PROJECT_REPOS)
              repositories {
                  google()
                  mavenCentral()
              }
          }
          rootProject.name = "ExamVault"
          include ':app'
          EOF

          # build.gradle (project)
          cat > android-project/build.gradle << 'EOF'
          plugins {
              id 'com.android.application' version '8.7.3' apply false
          }
          EOF

          # build.gradle (app) — with release signing config + AdMob
          cat > android-project/app/build.gradle << EOF
          plugins {
              id 'com.android.application'
          }
          android {
              namespace 'com.examvault.education'
              compileSdk 35
              defaultConfig {
                  applicationId "com.examvault.education"
                  minSdk 21
                  targetSdk 35
                  versionCode 15
                  versionName "1.6.1"
              }
              signingConfigs {
                  release {
                      storeFile file('../../examvault-release.keystore')
                      storePassword System.getenv("KEYSTORE_PASSWORD")
                      keyAlias System.getenv("KEY_ALIAS")
                      keyPassword System.getenv("KEY_PASSWORD")
                  }
                  debug {
                      storeFile file('../../examvault-release.keystore')
                      storePassword System.getenv("KEYSTORE_PASSWORD")
                      keyAlias System.getenv("KEY_ALIAS")
                      keyPassword System.getenv("KEY_PASSWORD")
                  }
              }
              buildTypes {
                  release {
                      minifyEnabled false
                      proguardFiles getDefaultProguardFile('proguard-android-optimize.txt'), 'proguard-rules.pro'
                      signingConfig signingConfigs.release
                  }
                  debug {
                      signingConfig signingConfigs.debug
                  }
              }
              bundle {
                  language {
                      enableSplit = true
                  }
                  density {
                      enableSplit = true
                  }
                  abi {
                      enableSplit = true
                  }
              }
              compileOptions {
                  sourceCompatibility JavaVersion.VERSION_17
                  targetCompatibility JavaVersion.VERSION_17
              }
          }
          dependencies {
              implementation 'androidx.core:core:1.15.0'
              implementation 'androidx.webkit:webkit:1.12.1'
              implementation 'androidx.browser:browser:1.8.0'
              implementation 'com.google.android.gms:play-services-ads:23.6.0'
          }
          EOF

          # AndroidManifest.xml — with AdMob App ID meta-data
          cat > android-project/app/src/main/AndroidManifest.xml << 'XMLEOF'
          <?xml version="1.0" encoding="utf-8"?>
          <manifest xmlns:android="http://schemas.android.com/apk/res/android">
              <uses-permission android:name="android.permission.INTERNET" />
              <uses-permission android:name="android.permission.ACCESS_NETWORK_STATE" />
              <uses-permission android:name="android.permission.POST_NOTIFICATIONS" />
              <application
                  android:allowBackup="true"
                  android:icon="@mipmap/ic_launcher"
                  android:label="ExamVault"
                  android:supportsRtl="true"
                  android:theme="@style/Theme.ExamVault"
                  android:usesCleartextTraffic="false"
                  android:networkSecurityConfig="@xml/network_security_config">
                  <meta-data
                      android:name="com.google.android.gms.ads.APPLICATION_ID"
                      android:value="ADMOB_APP_ID_PLACEHOLDER" />
                  <activity
                      android:name=".MainActivity"
                      android:exported="true"
                      android:configChanges="orientation|screenSize|keyboard|keyboardHidden"
                      android:launchMode="singleTop">
                      <intent-filter>
                          <action android:name="android.intent.action.MAIN" />
                          <category android:name="android.intent.category.LAUNCHER" />
                      </intent-filter>
                      <!-- Support UPI payment intents from WebView (Razorpay) -->
                      <intent-filter>
                          <action android:name="android.intent.action.VIEW" />
                          <category android:name="android.intent.category.DEFAULT" />
                          <category android:name="android.intent.category.BROWSABLE" />
                          <data android:scheme="upi" />
                      </intent-filter>
                      <!-- Deep link for payment return from Chrome browser -->
                      <intent-filter>
                          <action android:name="android.intent.action.VIEW" />
                          <category android:name="android.intent.category.DEFAULT" />
                          <category android:name="android.intent.category.BROWSABLE" />
                          <data android:scheme="examvault" />
                      </intent-filter>
                  </activity>
              </application>
          </manifest>
          XMLEOF

          # Replace AdMob App ID placeholder in manifest
          sed -i "s|ADMOB_APP_ID_PLACEHOLDER|$ADMOB_APP_ID|g" android-project/app/src/main/AndroidManifest.xml

          # Network security config — allow all HTTPS domains the web app needs
          mkdir -p android-project/app/src/main/res/xml
          cat > android-project/app/src/main/res/xml/network_security_config.xml << 'XMLEOF'
          <?xml version="1.0" encoding="utf-8"?>
          <network-security-config>
              <base-config cleartextTrafficPermitted="false">
                  <trust-anchors>
                      <certificates src="system" />
                  </trust-anchors>
              </base-config>
          </network-security-config>
          XMLEOF

          # MainActivity.java — copy from template and replace variables
          mkdir -p android-project/app/src/main/java/com/examvault/education
          cp android-templates/MainActivity.java android-project/app/src/main/java/com/examvault/education/MainActivity.java
          sed -i "s|\${APP_URL}|$APP_URL|g" android-project/app/src/main/java/com/examvault/education/MainActivity.java
          sed -i "s|\${ADMOB_INTERSTITIAL_ID}|$ADMOB_INTERSTITIAL_ID|g" android-project/app/src/main/java/com/examvault/education/MainActivity.java

          echo "=== Verify AdMob App ID in manifest ==="
          grep "APPLICATION_ID" android-project/app/src/main/AndroidManifest.xml
          echo "=== Verify APP_URL in MainActivity ==="
          grep "appUrl" android-project/app/src/main/java/com/examvault/education/MainActivity.java | head -2
          echo "=== Verify ADMOB ID in MainActivity ==="
          grep "admobInterstitialId" android-project/app/src/main/java/com/examvault/education/MainActivity.java | head -2
          echo "Android project created!"

          # strings.xml
          cat > android-project/app/src/main/res/values/strings.xml << 'EOF'
          <?xml version="1.0" encoding="utf-8"?>
          <resources>
              <string name="app_name">ExamVault</string>
          </resources>
          EOF

          # colors.xml
          cat > android-project/app/src/main/res/values/colors.xml << 'EOF'
          <?xml version="1.0" encoding="utf-8"?>
          <resources>
              <color name="colorPrimary">#001A4B</color>
              <color name="colorPrimaryDark">#001A4B</color>
              <color name="colorAccent">#EB6301</color>
          </resources>
          EOF

          # styles.xml
          cat > android-project/app/src/main/res/values/styles.xml << 'EOF'
          <?xml version="1.0" encoding="utf-8"?>
          <resources>
              <style name="Theme.ExamVault" parent="android:Theme.Material.Light.NoActionBar">
                  <item name="android:colorPrimary">@color/colorPrimary</item>
                  <item name="android:colorPrimaryDark">@color/colorPrimaryDark</item>
                  <item name="android:colorAccent">@color/colorAccent</item>
                  <item name="android:statusBarColor">@color/colorPrimary</item>
                  <item name="android:navigationBarColor">@color/colorPrimary</item>
              </style>
          </resources>
          EOF

          # proguard rules
          cat > android-project/app/proguard-rules.pro << 'EOF'
          -keepclassmembers class * {
              @android.webkit.JavascriptInterface <methods>;
          }
          EOF

          # gradle wrapper properties
          cat > android-project/gradle/wrapper/gradle-wrapper.properties << 'EOF'
          distributionBase=GRADLE_USER_HOME
          distributionPath=wrapper/dists
          distributionUrl=https\://services.gradle.org/distributions/gradle-8.9-bin.zip
          zipStoreBase=GRADLE_USER_HOME
          zipStorePath=wrapper/dists
          EOF

          # gradlew script (minimal)
          cat > android-project/gradlew << 'GRADLEWEOF'
          #!/bin/sh
          exec gradle "$@"
          GRADLEWEOF
          chmod +x android-project/gradlew

          # gradle.properties
          cat > android-project/gradle.properties << 'EOF'
          android.useAndroidX=true
          org.gradle.jvmargs=-Xmx2048m
          EOF

      - name: Build Release APK
        working-directory: android-project
        env:
          KEYSTORE_PASSWORD: ${{ secrets.KEYSTORE_PASSWORD }}
          KEY_ALIAS: ${{ secrets.KEY_ALIAS }}
          KEY_PASSWORD: ${{ secrets.KEY_PASSWORD }}
        run: |
          gradle assembleRelease --no-daemon 2>&1 || {
            echo "Gradle failed, trying with wrapper setup..."
            gradle wrapper --gradle-version 8.9 2>&1 || true
            ./gradlew assembleRelease --no-daemon 2>&1
          }

      - name: Build Release AAB (for Play Store)
        if: ${{ github.event.inputs.build_aab == 'true' }}
        working-directory: android-project
        env:
          KEYSTORE_PASSWORD: ${{ secrets.KEYSTORE_PASSWORD }}
          KEY_ALIAS: ${{ secrets.KEY_ALIAS }}
          KEY_PASSWORD: ${{ secrets.KEY_PASSWORD }}
        run: |
          gradle bundleRelease --no-daemon 2>&1 || {
            echo "Gradle AAB failed, trying with wrapper..."
            ./gradlew bundleRelease --no-daemon 2>&1
          }

      - name: Find and prepare APK
        run: |
          APK=$(find android-project -name "*.apk" -type f | head -1)
          if [ -z "$APK" ]; then
            echo "No APK found!"
            find android-project -name "*.apk" -type f 2>/dev/null
            ls -la android-project/app/build/outputs/apk/release/ 2>/dev/null || true
            ls -la android-project/app/build/outputs/apk/debug/ 2>/dev/null || true
            exit 1
          fi
          cp "$APK" examvault.apk
          ls -lh examvault.apk

      - name: Find and prepare AAB
        if: ${{ github.event.inputs.build_aab == 'true' }}
        run: |
          AAB=$(find android-project -name "*.aab" -type f | head -1)
          if [ -z "$AAB" ]; then
            echo "No AAB found!"
            ls -la android-project/app/build/outputs/bundle/release/ 2>/dev/null || true
            exit 1
          fi
          cp "$AAB" examvault.aab
          ls -lh examvault.aab

      - name: Upload APK artifact
        uses: actions/upload-artifact@v4
        with:
          name: examvault-apk
          path: examvault.apk

      - name: Upload AAB artifact
        if: ${{ github.event.inputs.build_aab == 'true' }}
        uses: actions/upload-artifact@v4
        with:
          name: examvault-aab
          path: examvault.aab

      - name: Create GitHub Release
        uses: softprops/action-gh-release@v2
        with:
          tag_name: v1.0.${{ github.run_number }}
          name: ExamVault APK v1.0.${{ github.run_number }}
          body: |
            ## ExamVault Android APK

            ### How to Install:
            1. Download examvault.apk below
            2. Open on your Android phone
            3. Allow "Install from unknown sources" if prompted
            4. Install and enjoy!

            ### Features:
            - Mock Tests, Free Tests, Daily Quizzes
            - Previous Year Papers & Notes
            - Leaderboard & Profile
            - Hardware back button support
            - Exam exit warning dialog
            - Content progress tracking
            - AdMob Interstitial Ads
          files: |
            examvault.apk
            examvault.aab
        env:
          GITHUB_TOKEN: ${{ secrets.GITHUB_TOKEN }}
