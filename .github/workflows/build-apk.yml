name: Build Android APK

on:
  workflow_dispatch:
    inputs:
      app_url:
        description: 'Deployed PWA URL (e.g. https://examvault-theta.vercel.app)'
        required: true
      build_aab:
        description: 'Also build AAB for Play Store? (true/false)'
        required: false
        default: 'false'

permissions:
  contents: write

jobs:
  build:
    runs-on: ubuntu-latest
    timeout-minutes: 25
    steps:
      - name: Checkout code
        uses: actions/checkout@v4

      - name: Setup JDK 17
        uses: actions/setup-java@v4
        with:
          java-version: '17'
          distribution: 'temurin'

      - name: Setup Android SDK
        uses: android-actions/setup-android@v3

      - name: Install Android components
        run: |
          yes | sdkmanager --licenses 2>/dev/null || true
          sdkmanager "platforms;android-35" "build-tools;35.0.0"

      - name: Decode release keystore
        run: |
          echo "${{ secrets.KEYSTORE_BASE64 }}" | base64 -d > examvault-release.keystore

      - name: Create Android WebView project
        run: |
          APP_URL="${{ github.event.inputs.app_url }}"
          BUILD_AAB="${{ github.event.inputs.build_aab }}"
          echo "Building for: $APP_URL (AAB: $BUILD_AAB)"

          # Create project directory structure
          mkdir -p android-project/app/src/main/java/com/examvault/app
          mkdir -p android-project/app/src/main/res/values
          mkdir -p android-project/app/src/main/res/mipmap-hdpi
          mkdir -p android-project/app/src/main/res/mipmap-mdpi
          mkdir -p android-project/app/src/main/res/mipmap-xhdpi
          mkdir -p android-project/app/src/main/res/mipmap-xxhdpi
          mkdir -p android-project/app/src/main/res/mipmap-xxxhdpi
          mkdir -p android-project/gradle/wrapper

          # Copy icons from public/icons
          cp public/icons/icon-72x72.png android-project/app/src/main/res/mipmap-mdpi/ic_launcher.png
          cp public/icons/icon-96x96.png android-project/app/src/main/res/mipmap-hdpi/ic_launcher.png
          cp public/icons/icon-144x144.png android-project/app/src/main/res/mipmap-xhdpi/ic_launcher.png
          cp public/icons/icon-192x192.png android-project/app/src/main/res/mipmap-xxhdpi/ic_launcher.png
          cp public/icons/icon-512x512.png android-project/app/src/main/res/mipmap-xxxhdpi/ic_launcher.png

          # settings.gradle
          cat > android-project/settings.gradle << 'EOF'
          pluginManagement {
              repositories {
                  google()
                  mavenCentral()
                  gradlePluginPortal()
              }
          }
          dependencyResolutionManagement {
              repositoriesMode.set(RepositoriesMode.FAIL_ON_PROJECT_REPOS)
              repositories {
                  google()
                  mavenCentral()
              }
          }
          rootProject.name = "ExamVault"
          include ':app'
          EOF

          # build.gradle (project)
          cat > android-project/build.gradle << 'EOF'
          plugins {
              id 'com.android.application' version '8.7.3' apply false
          }
          EOF

          # build.gradle (app) — with release signing config
          cat > android-project/app/build.gradle << 'EOF'
          plugins {
              id 'com.android.application'
          }
          android {
              namespace 'com.examvault.app'
              compileSdk 35
              defaultConfig {
                  applicationId "com.examvault.app"
                  minSdk 21
                  targetSdk 35
                  versionCode 1
                  versionName "1.0.0"
              }
              signingConfigs {
                  release {
                      storeFile file('../../examvault-release.keystore')
                      storePassword System.getenv("KEYSTORE_PASSWORD")
                      keyAlias System.getenv("KEY_ALIAS")
                      keyPassword System.getenv("KEY_PASSWORD")
                  }
                  debug {
                      storeFile file('../../examvault-release.keystore')
                      storePassword System.getenv("KEYSTORE_PASSWORD")
                      keyAlias System.getenv("KEY_ALIAS")
                      keyPassword System.getenv("KEY_PASSWORD")
                  }
              }
              buildTypes {
                  release {
                      minifyEnabled true
                      proguardFiles getDefaultProguardFile('proguard-android-optimize.txt'), 'proguard-rules.pro'
                      signingConfig signingConfigs.release
                  }
                  debug {
                      signingConfig signingConfigs.debug
                  }
              }
              bundle {
                  language {
                      enableSplit = true
                  }
                  density {
                      enableSplit = true
                  }
                  abi {
                      enableSplit = true
                  }
              }
              compileOptions {
                  sourceCompatibility JavaVersion.VERSION_17
                  targetCompatibility JavaVersion.VERSION_17
              }
          }
          dependencies {
              implementation 'androidx.core:core:1.15.0'
              implementation 'androidx.webkit:webkit:1.12.1'
          }
          EOF

          # AndroidManifest.xml
          cat > android-project/app/src/main/AndroidManifest.xml << 'XMLEOF'
          <?xml version="1.0" encoding="utf-8"?>
          <manifest xmlns:android="http://schemas.android.com/apk/res/android">
              <uses-permission android:name="android.permission.INTERNET" />
              <uses-permission android:name="android.permission.ACCESS_NETWORK_STATE" />
              <uses-permission android:name="android.permission.POST_NOTIFICATIONS" />
              <application
                  android:allowBackup="true"
                  android:icon="@mipmap/ic_launcher"
                  android:label="ExamVault"
                  android:supportsRtl="true"
                  android:theme="@style/Theme.ExamVault"
                  android:usesCleartextTraffic="false"
                  android:networkSecurityConfig="@xml/network_security_config">
                  <activity
                      android:name=".MainActivity"
                      android:exported="true"
                      android:configChanges="orientation|screenSize|keyboard|keyboardHidden"
                      android:launchMode="singleTop">
                      <intent-filter>
                          <action android:name="android.intent.action.MAIN" />
                          <category android:name="android.intent.category.LAUNCHER" />
                      </intent-filter>
                  </activity>
              </application>
          </manifest>
          XMLEOF

          # Network security config
          mkdir -p android-project/app/src/main/res/xml
          cat > android-project/app/src/main/res/xml/network_security_config.xml << 'XMLEOF'
          <?xml version="1.0" encoding="utf-8"?>
          <network-security-config>
              <domain-config cleartextTrafficPermitted="false">
                  <domain includeSubdomains="true">examvault-theta.vercel.app</domain>
                  <domain includeSubdomains="true">firebaseio.com</domain>
                  <domain includeSubdomains="true">googleapis.com</domain>
              </domain-config>
          </network-security-config>
          XMLEOF

          # MainActivity.java
          cat > android-project/app/src/main/java/com/examvault/app/MainActivity.java << JAVAEOF
          package com.examvault.app;

          import android.app.Activity;
          import android.app.AlertDialog;
          import android.content.DialogInterface;
          import android.content.Intent;
          import android.content.SharedPreferences;
          import android.os.Bundle;
          import android.webkit.WebView;
          import android.webkit.WebViewClient;
          import android.webkit.WebSettings;
          import android.webkit.WebChromeClient;
          import android.webkit.ValueCallback;
          import android.webkit.WebResourceError;
          import android.webkit.WebResourceRequest;
          import android.view.View;
          import android.view.Window;
          import android.view.WindowManager;
          import android.widget.FrameLayout;
          import android.net.Uri;
          import android.graphics.Color;
          import android.os.Build;

          public class MainActivity extends Activity {
              private WebView webView;
              private View splashScreen;
              private static final String PREFS_NAME = "examvault_prefs";
              private static final String KEY_URL = "last_url";
              private String appUrl = "${APP_URL}";
              private boolean webViewReady = false;

              @Override
              protected void onCreate(Bundle savedInstanceState) {
                  super.onCreate(savedInstanceState);
                  requestWindowFeature(Window.FEATURE_NO_TITLE);
                  getWindow().setFlags(
                      WindowManager.LayoutParams.FLAG_FULLSCREEN,
                      WindowManager.LayoutParams.FLAG_FULLSCREEN);

                  FrameLayout container = new FrameLayout(this);
                  setContentView(container);

                  // === SPLASH SCREEN ===
                  splashScreen = new View(this) {
                      @Override
                      protected void onDraw(android.graphics.Canvas canvas) {
                          super.onDraw(canvas);
                          canvas.drawColor(Color.parseColor("#001A4B"));
                          android.graphics.Paint paint = new android.graphics.Paint();
                          paint.setColor(Color.WHITE);
                          paint.setTextSize(80);
                          paint.setTypeface(android.graphics.Typeface.create(android.graphics.Typeface.DEFAULT, android.graphics.Typeface.BOLD));
                          paint.setTextAlign(android.graphics.Paint.Align.CENTER);
                          int cx = getWidth() / 2;
                          int cy = getHeight() / 2 - 40;
                          canvas.drawText("EXAM", cx, cy, paint);
                          paint.setColor(Color.parseColor("#EB6301"));
                          canvas.drawText("VAULT", cx, cy + 90, paint);
                          paint.setColor(Color.parseColor("#FEA216"));
                          paint.setTextSize(28);
                          paint.setTypeface(android.graphics.Typeface.create(android.graphics.Typeface.DEFAULT, android.graphics.Typeface.NORMAL));
                          canvas.drawText("Loading...", cx, cy + 150, paint);
                      }
                  };
                  container.addView(splashScreen, new FrameLayout.LayoutParams(-1, -1));

                  // === WEBVIEW ===
                  webView = new WebView(this);
                  container.addView(webView, new FrameLayout.LayoutParams(-1, -1));
                  webView.setVisibility(View.GONE);
                  webView.setBackgroundColor(Color.parseColor("#001A4B"));

                  WebSettings settings = webView.getSettings();
                  settings.setJavaScriptEnabled(true);
                  settings.setDomStorageEnabled(true);
                  settings.setDatabaseEnabled(true);
                  settings.setCacheMode(WebSettings.LOAD_CACHE_ELSE_NETWORK);
                  settings.setAllowFileAccess(true);
                  settings.setMediaPlaybackRequiresUserGesture(false);
                  settings.setSupportZoom(false);
                  settings.setUseWideViewPort(true);
                  settings.setLoadWithOverviewMode(true);
                  settings.setMixedContentMode(WebSettings.MIXED_CONTENT_NEVER_ALLOW);
                  settings.setDatabasePath(getFilesDir().getPath() + "/databases");
                  android.webkit.CookieManager cookieManager = android.webkit.CookieManager.getInstance();
                  cookieManager.setAcceptCookie(true);
                  cookieManager.setAcceptThirdPartyCookies(webView, true);

                  webView.setWebViewClient(new WebViewClient() {
                      @Override
                      public boolean shouldOverrideUrlLoading(WebView view, String url) {
                          String host = Uri.parse(url).getHost();
                          if (host != null &&
                              (host.contains("examvault") ||
                               host.contains("vercel.app") ||
                               host.contains("firebaseio.com") ||
                               host.contains("googleapis.com") ||
                               host.contains("firebaseapp.com"))) {
                              return false;
                          }
                          try {
                              view.getContext().startActivity(new Intent(Intent.ACTION_VIEW, Uri.parse(url)));
                          } catch (Exception e) {}
                          return true;
                      }

                      @Override
                      public void onPageFinished(WebView view, String url) {
                          super.onPageFinished(view, url);
                          webViewReady = true;
                          splashScreen.setVisibility(View.GONE);
                          webView.setVisibility(View.VISIBLE);
                          view.evaluateJavascript("if(!window.__EV_WEBVIEW){window.__EV_WEBVIEW=true;}", null);
                          SharedPreferences prefs = getSharedPreferences(PREFS_NAME, MODE_PRIVATE);
                          prefs.edit().putString(KEY_URL, url).apply();
                      }

                      @Override
                      public void onReceivedError(WebView view, WebResourceRequest request, WebResourceError error) {
                          super.onReceivedError(view, request, error);
                      }
                  });

                  webView.setWebChromeClient(new WebChromeClient());

                  String urlToLoad = appUrl;
                  if (savedInstanceState != null) {
                      String savedUrl = savedInstanceState.getString(KEY_URL);
                      if (savedUrl != null && !savedUrl.isEmpty()) {
                          urlToLoad = savedUrl;
                      }
                  } else {
                      Uri data = getIntent().getData();
                      if (data != null) {
                          urlToLoad = data.toString();
                      }
                  }
                  webView.loadUrl(urlToLoad);
              }

              @Override
              protected void onSaveInstanceState(Bundle outState) {
                  super.onSaveInstanceState(outState);
                  if (webView != null && webView.getUrl() != null) {
                      outState.putString(KEY_URL, webView.getUrl());
                  }
              }

              @Override
              public void onBackPressed() {
                  if (webView == null) { super.onBackPressed(); return; }
                  webView.evaluateJavascript("(function(){ try { var s = window.__ZUSTAND_STORE__; if(s && s.getState) { var st = s.getState(); if(st.currentView === 'exam') { st.setExamBackWarning(true); return 'exam_warning'; } else if(st.canGoBack && st.canGoBack()) { st.goBack(); return 'went_back'; } else if(st.currentView === 'home') { return 'at_home'; } else { st.goBack(); return 'went_back'; } } return 'no_store'; } catch(e) { return 'error'; } })()", new ValueCallback<String>() {
                      @Override
                      public void onReceiveValue(String result) {
                          result = result != null ? result.replace("\"", "") : "";
                          if ("exam_warning".equals(result)) {
                              // Warning dialog shown in JS
                          } else if ("went_back".equals(result)) {
                              // done
                          } else if ("at_home".equals(result)) {
                              showExitDialog();
                          } else {
                              if (webView.canGoBack()) { webView.goBack(); }
                              else { showExitDialog(); }
                          }
                      }
                  });
              }

              private void showExitDialog() {
                  new AlertDialog.Builder(this)
                      .setTitle("Exit ExamVault?")
                      .setMessage("Are you sure you want to close the app?")
                      .setPositiveButton("Exit", new DialogInterface.OnClickListener() {
                          @Override public void onClick(DialogInterface d, int w) { finish(); }
                      })
                      .setNegativeButton("Cancel", null)
                      .show();
              }

              private int recoveryAttemptCount = 0;

              @Override
              protected void onResume() {
                  super.onResume();
                  if (webView != null) {
                      webView.onResume();
                      if (!webViewReady) {
                          recoveryAttemptCount = 0;
                          scheduleRecoveryCheck(1500);
                      }
                      splashScreen.setVisibility(View.GONE);
                      webView.setVisibility(View.VISIBLE);
                  }
              }

              private void scheduleRecoveryCheck(final long delayMs) {
                  if (webView == null || splashScreen == null) return;
                  webView.postDelayed(new Runnable() {
                      @Override public void run() {
                          if (webView == null) return;
                          if (webView.getContentHeight() == 0) {
                              recoveryAttemptCount++;
                              SharedPreferences prefs = getSharedPreferences(PREFS_NAME, MODE_PRIVATE);
                              String lastUrl = prefs.getString(KEY_URL, appUrl);
                              webView.loadUrl(lastUrl);
                              if (recoveryAttemptCount < 3) {
                                  scheduleRecoveryCheck(3000);
                              }
                          }
                          splashScreen.setVisibility(View.GONE);
                          webView.setVisibility(View.VISIBLE);
                      }
                  }, delayMs);
              }

              @Override
              protected void onPause() {
                  if (webView != null) webView.onPause();
                  super.onPause();
              }

              @Override
              protected void onDestroy() {
                  if (webView != null) {
                      webView.stopLoading();
                      webView.destroy();
                      webView = null;
                  }
                  super.onDestroy();
              }

              @Override
              protected void onNewIntent(Intent intent) {
                  super.onNewIntent(intent);
                  if (intent != null && intent.getData() != null) {
                      String url = intent.getData().toString();
                      if (webView != null) {
                          webView.loadUrl(url);
                      }
                  }
              }
          }
          JAVAEOF

          # strings.xml
          cat > android-project/app/src/main/res/values/strings.xml << 'EOF'
          <?xml version="1.0" encoding="utf-8"?>
          <resources>
              <string name="app_name">ExamVault</string>
          </resources>
          EOF

          # colors.xml
          cat > android-project/app/src/main/res/values/colors.xml << 'EOF'
          <?xml version="1.0" encoding="utf-8"?>
          <resources>
              <color name="colorPrimary">#001A4B</color>
              <color name="colorPrimaryDark">#001A4B</color>
              <color name="colorAccent">#EB6301</color>
          </resources>
          EOF

          # styles.xml
          cat > android-project/app/src/main/res/values/styles.xml << 'EOF'
          <?xml version="1.0" encoding="utf-8"?>
          <resources>
              <style name="Theme.ExamVault" parent="android:Theme.Material.Light.NoActionBar">
                  <item name="android:colorPrimary">@color/colorPrimary</item>
                  <item name="android:colorPrimaryDark">@color/colorPrimaryDark</item>
                  <item name="android:colorAccent">@color/colorAccent</item>
                  <item name="android:statusBarColor">@color/colorPrimary</item>
                  <item name="android:navigationBarColor">@color/colorPrimary</item>
              </style>
          </resources>
          EOF

          # proguard rules
          cat > android-project/app/proguard-rules.pro << 'EOF'
          -keepclassmembers class * {
              @android.webkit.JavascriptInterface <methods>;
          }
          EOF

          # gradle wrapper properties
          cat > android-project/gradle/wrapper/gradle-wrapper.properties << 'EOF'
          distributionBase=GRADLE_USER_HOME
          distributionPath=wrapper/dists
          distributionUrl=https\://services.gradle.org/distributions/gradle-8.9-bin.zip
          zipStoreBase=GRADLE_USER_HOME
          zipStorePath=wrapper/dists
          EOF

          # gradlew script (minimal)
          cat > android-project/gradlew << 'GRADLEWEOF'
          #!/bin/sh
          exec gradle "$@"
          GRADLEWEOF
          chmod +x android-project/gradlew

          # gradle.properties
          cat > android-project/gradle.properties << 'EOF'
          android.useAndroidX=true
          org.gradle.jvmargs=-Xmx2048m
          EOF

          echo "Android project created!"

      - name: Build Release APK
        working-directory: android-project
        env:
          KEYSTORE_PASSWORD: ${{ secrets.KEYSTORE_PASSWORD }}
          KEY_ALIAS: ${{ secrets.KEY_ALIAS }}
          KEY_PASSWORD: ${{ secrets.KEY_PASSWORD }}
        run: |
          gradle assembleRelease --no-daemon 2>&1 || {
            echo "Gradle failed, trying with wrapper setup..."
            gradle wrapper --gradle-version 8.9 2>&1 || true
            ./gradlew assembleRelease --no-daemon 2>&1
          }

      - name: Build Release AAB (for Play Store)
        if: ${{ github.event.inputs.build_aab == 'true' }}
        working-directory: android-project
        env:
          KEYSTORE_PASSWORD: ${{ secrets.KEYSTORE_PASSWORD }}
          KEY_ALIAS: ${{ secrets.KEY_ALIAS }}
          KEY_PASSWORD: ${{ secrets.KEY_PASSWORD }}
        run: |
          gradle bundleRelease --no-daemon 2>&1 || {
            echo "Gradle AAB failed, trying with wrapper..."
            ./gradlew bundleRelease --no-daemon 2>&1
          }

      - name: Find and prepare APK
        run: |
          APK=$(find android-project -name "*.apk" -type f | head -1)
          if [ -z "$APK" ]; then
            echo "No APK found!"
            find android-project -name "*.apk" -type f 2>/dev/null
            ls -la android-project/app/build/outputs/apk/release/ 2>/dev/null || true
            ls -la android-project/app/build/outputs/apk/debug/ 2>/dev/null || true
            exit 1
          fi
          cp "$APK" examvault.apk
          ls -lh examvault.apk

      - name: Find and prepare AAB
        if: ${{ github.event.inputs.build_aab == 'true' }}
        run: |
          AAB=$(find android-project -name "*.aab" -type f | head -1)
          if [ -z "$AAB" ]; then
            echo "No AAB found!"
            ls -la android-project/app/build/outputs/bundle/release/ 2>/dev/null || true
            exit 1
          fi
          cp "$AAB" examvault.aab
          ls -lh examvault.aab

      - name: Upload APK artifact
        uses: actions/upload-artifact@v4
        with:
          name: examvault-apk
          path: examvault.apk

      - name: Upload AAB artifact
        if: ${{ github.event.inputs.build_aab == 'true' }}
        uses: actions/upload-artifact@v4
        with:
          name: examvault-aab
          path: examvault.aab

      - name: Create GitHub Release
        uses: softprops/action-gh-release@v2
        with:
          tag_name: v1.0.${{ github.run_number }}
          name: ExamVault APK v1.0.${{ github.run_number }}
          body: |
            ## ExamVault Android APK

            ### How to Install:
            1. Download examvault.apk below
            2. Open on your Android phone
            3. Allow "Install from unknown sources" if prompted
            4. Install and enjoy!

            ### Features:
            - Mock Tests, Free Tests, Daily Quizzes
            - Previous Year Papers & Notes
            - Leaderboard & Profile
            - Hardware back button support
            - Exam exit warning dialog
            - Content progress tracking
          files: |
            examvault.apk
            examvault.aab
        env:
          GITHUB_TOKEN: ${{ secrets.GITHUB_TOKEN }}
